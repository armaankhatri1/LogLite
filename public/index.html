<!DOCTYPE html>
<html>
<head>
  <title>LogLite Dashboard</title>
</head>
<body>

  <h1>LogLite Dashboard</h1>

  <div>Total Logs: <span id="totalLogs">0</span></div>
  <div>INFO: <span id="infoCount">0</span></div>
  <div>WARN: <span id="warnCount">0</span></div>
  <div>ERROR: <span id="errorCount">0</span></div>
  <div>UNKNOWN: <span id="unknownCount">0</span></div>

  <h2>Recurring Warnings and Errors</h2>
  <table border="1">
    <thead>
      <tr>
        <th>Severity</th>
        <th>Message</th>
        <th>Count</th>
        <th>First Seen</th>
        <th>Last Seen</th>
      </tr>
    </thead>
    <tbody id="recurringIssuesBody">
      <tr>
        <td colspan="5">No recurring warnings or errors found.</td>
      </tr>
    </tbody>
  </table>

  <button onclick="loadLogData()">Refresh Logs</button>

  <script src="script.js"></script>
</body>
</html>
