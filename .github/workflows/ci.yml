# ─── LogLite CI Workflow ──────────────────────────────────────
name: LogLite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate sample logs
        run: node sampleApp.js winston

      - name: Run tests
        run: npm test

      - name: Build Next.js
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t loglite:test .

      - name: Verify API starts
        run: |
          docker run -d --name loglite-ci -p 3001:3001 loglite:test node server.js
          sleep 3
          curl -f http://localhost:3001/api/health || exit 1
          docker stop loglite-ci
